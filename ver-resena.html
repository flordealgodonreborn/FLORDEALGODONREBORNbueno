<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

// 👇 PON AQUÍ TU URL REAL (sin tocar el ?id=)
const URL = `https://script.google.com/macros/s/AKfycbyt9MEWWRjf8PDgPGP4vhO4pUois9i4bxFM4tx6nBsnLaXlNGrv1TQ83wr-Ccy-EeBwsw/exec?id=${id}`;

fetch(URL)
  .then(res => res.json())
  .then(data => {

    if (data.error) {
      document.getElementById("contenido").innerHTML = "❌ Reseña no encontrada";
      return;
    }

    let estrellas = "⭐".repeat(data.rating);

    document.getElementById("contenido").innerHTML = `
      <p><strong>Valoración:</strong> ${estrellas}</p>
      <p><strong>Atención:</strong> ${data.atencion}</p>
      <p><strong>Plazo:</strong> ${data.plazo}</p>
      <p><strong>Resultado:</strong> ${data.resultado}</p>
      <p><strong>Precio:</strong> ${data.precio}</p>
      <p><strong>Comentario:</strong> ${data.mejora}</p>
    `;
  })
  .catch(() => {
    document.getElementById("contenido").innerHTML = "⚠️ Error cargando reseña";
  });
</script>
