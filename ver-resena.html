<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Ver reseña</title>
</head>

<body>

<h1>Reseña</h1>

<div id="contenido">Cargando...</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const URL = `TU_URL_DE_APPS_SCRIPT?id=${id}`;

fetch(URL)
  .then(res => res.json())
  .then(data => {

    if (data.error) {
      document.getElementById("contenido").innerHTML = "❌ No encontrada";
      return;
    }

    document.getElementById("contenido").innerHTML = `
      <p><b>⭐ Rating:</b> ${"⭐".repeat(data.rating)}</p>
      <p><b>Atención:</b> ${data.atencion}</p>
      <p><b>Plazo:</b> ${data.plazo}</p>
      <p><b>Resultado:</b> ${data.resultado}</p>
      <p><b>Precio:</b> ${data.precio}</p>
      <p><b>Comentario:</b> ${data.mejora}</p>
    `;
  })
  .catch(err => {
    document.getElementById("contenido").innerHTML = "❌ Error cargando";
  });
</script>

</body>
</html>
