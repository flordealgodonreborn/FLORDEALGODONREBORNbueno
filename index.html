<!DOCTYPE html>
<!--
  Indica que el documento usa HTML5.
  Es obligatorio para que los navegadores funcionen correctamente.
-->
<html lang="es">
<!--
  lang="es" indica que el idioma principal del contenido es español.
  Esto ayuda a Google y a lectores de accesibilidad.
-->
<head>

  <!-- Codificación de caracteres -->
  <!-- Permite mostrar bien acentos, ñ, etc. -->
  <meta charset="UTF-8">

  <!-- Responsive / móviles -->
  <!-- Hace que la web se adapte a móviles y tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- TÍTULO SEO -->
  <!-- Es lo que aparece en Google y en la pestaña del navegador -->
  <title>Flor de Algodón Reborn | Bebés Reborn Artesanales Hechos a Mano</title>

  <!-- META DESCRIPTION -->
  <!-- Texto descriptivo que aparece debajo del título en Google -->
  <!-- No posiciona, pero aumenta los clics -->
  <meta name="description" content="Flor de Algodón Reborn crea bebés reborn artesanales únicos, hechos a mano con máximo realismo, amor y cuidado en cada detalle.">

  <!-- CANONICAL -->
  <!-- Indica a Google cuál es la URL oficial de esta página -->
  <!-- MUY importante tras cambiar de dominio -->
  <link rel="canonical" href="https://flordealgodonreborn.com/">

  <!-- OPEN GRAPH (redes sociales) -->
  <!-- Controla cómo se ve la web al compartirla en WhatsApp, Facebook, etc. -->
  <meta property="og:title" content="Flor de Algodón Reborn">
  <meta property="og:description" content="Bebés reborn artesanales únicos hechos a mano con realismo extremo y delicadeza.">
  <meta property="og:url" content="https://flordealgodonreborn.com/">
  <meta property="og:type" content="website">
  <!-- Imagen opcional para redes (cuando tengas una) -->
  <!-- <meta property="og:image" content="https://flordealgodonreborn.com/img/preview.jpg"> -->

  <!-- ENLACE AL CSS -->
  <!-- Esto mantiene todo tu diseño, colores y estructura -->
  <link rel="stylesheet" href="styles.css?v=1">

<style>
body {
  background: black !important;
  color: yellow !important;
  font-size: 40px !important;
}
</style>

</head>
